server:
  port: 8090
jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.cloud.gateway: TRACE

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8094
              predicates:
                - Path=/api/auth/**

            - id: betslip-service
              uri: http://localhost:8092
              predicates:
                - Path=/api/betslips/**

            - id: match-service
              uri: http://localhost:8093
              predicates:
                - Path=/api/matches/**